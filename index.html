<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Security Meta Tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob: wss:;" />

    <!-- SEO & Marketing Meta Tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="description" content="Discover premium attars, luxurious perfumes, and exclusive gift sets at Rawda Fragrance. Authentic and high-quality scents for every occasion." />
    <meta name="keywords" content="perfume, attar, luxury fragrance, oud, musk, gift sets, Rawda Fragrance, exclusive perfume, organic scents" />
    <meta name="author" content="Rawda Fragrance" />
    
    <!-- Open Graph / Meta Marketing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rawda Fragrance | Premium Luxury Aromas" />
    <meta property="og:description" content="Discover premium attars, luxurious perfumes, and exclusive gift sets at Rawda Fragrance." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80" />
    <meta property="og:url" content="https://rawdafragrance.com" />
    <meta property="og:site_name" content="Rawda Fragrance" />
    
    <!-- Twitter Card Meta Tags for Social Sharing -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rawda Fragrance | Premium Luxury Aromas" />
    <meta name="twitter:description" content="Discover premium attars, luxurious perfumes, and exclusive gift sets at Rawda Fragrance." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80" />
    
    <title>Rawda Fragrance | Premium Luxury Aromas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
